<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Cooper — Parametric Barrel Lamp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;500;600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#fbfaf7; --paper2:#f1efe9; --ink:#1d1f24; --muted:#71747c; --faint:#9b9ea6;
  --line:#e4e1d9; --line2:#cfccc3;
  --accent:#2c4a76; --accent2:#3d5f93; --accent-ink:#ffffff;
  --display:"Oswald",system-ui,sans-serif;
  --mono:"Spline Sans Mono",ui-monospace,monospace;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{background:#0c0907; color:var(--ink); font-family:var(--mono); overflow:hidden;}
#app{display:grid; grid-template-columns:340px 5px 1fr; height:100vh}
#split{cursor:col-resize; background:var(--line); transition:background .15s}
#split:hover,#split.drag{background:var(--accent2)}
/* ---- control rail: classic paper ---- */
#rail{ background:var(--paper); border-right:1px solid var(--line2); padding:22px 20px 28px; overflow-y:auto; }
.brand{display:flex; align-items:baseline; gap:10px; margin-bottom:2px}
.brand .mark{ font-family:var(--display); font-weight:600; font-size:28px; letter-spacing:.16em;
  text-transform:uppercase; color:var(--ink); line-height:1; }
.brand .mark b{color:var(--accent); font-weight:600}
.eyebrow{font-size:10.5px; letter-spacing:.32em; text-transform:uppercase; color:var(--faint);
  margin:2px 0 18px 2px; border-bottom:1px solid var(--line); padding-bottom:14px}
.group{margin:0 0 22px}
.group h2{ font-family:var(--display); font-weight:500; font-size:11px; letter-spacing:.30em;
  text-transform:uppercase; color:var(--muted); margin:0 0 12px; display:flex; align-items:center; gap:10px; }
.group h2::after{content:""; flex:1; height:1px; background:var(--line)}
.ctrl{margin:0 0 13px}
.ctrl .row{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px}
.ctrl label{font-size:11px; letter-spacing:.06em; color:var(--muted); text-transform:uppercase}
.vwrap{display:flex; align-items:baseline}
.vin{width:74px; background:transparent; border:none; border-bottom:1px dashed var(--line2);
  font-family:var(--mono); font-size:12.5px; color:var(--ink); text-align:right; padding:0 1px 1px; outline:none;
  font-variant-numeric:tabular-nums}
.vin:focus{border-bottom:1px solid var(--accent)}
.vu{font-size:10px; color:var(--faint); margin-left:5px; min-width:16px; white-space:pre}
input[type=range]{ -webkit-appearance:none; width:100%; height:2px; background:var(--line2); border-radius:2px; outline:none}
input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:14px;height:14px;border-radius:50%;
  background:var(--paper); border:2px solid var(--accent); cursor:pointer;}
input[type=range]::-moz-range-thumb{ width:14px;height:14px;border-radius:50%; background:var(--paper);
  border:2px solid var(--accent); cursor:pointer;}
.seg{display:flex; gap:6px}
.seg.grid{display:grid; grid-template-columns:1fr 1fr; gap:6px}
.seg.five{display:grid; grid-template-columns:repeat(5,1fr); gap:6px}
.seg button{flex:1; background:#fff; color:var(--muted); border:1px solid var(--line2);
  padding:8px 0; font-family:var(--mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase;
  border-radius:6px; cursor:pointer; transition:.15s}
.seg button:hover{color:var(--ink); border-color:var(--accent2)}
.seg button.on{background:var(--accent); color:var(--accent-ink); border-color:var(--accent)}
.txt{width:100%; background:#fff; border:1px solid var(--line2); color:var(--ink);
  font-family:var(--display); font-size:20px; letter-spacing:.18em; text-align:center; padding:8px;
  border-radius:6px; margin-top:10px}
.txt:focus{outline:none; border-color:var(--accent)}
.toggle{display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none}
.toggle .box{width:34px;height:18px;border-radius:10px;background:var(--line2); position:relative; transition:.2s}
.toggle .box::after{content:"";position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;
  background:#fff;transition:.2s; box-shadow:0 1px 2px rgba(0,0,0,.18)}
.toggle.on .box{background:var(--accent)}
.toggle.on .box::after{left:18px}
.toggle span{font-size:11px;letter-spacing:.06em;color:var(--muted);text-transform:uppercase}
.export{display:flex; flex-direction:column; gap:9px}
.export button{ font-family:var(--display); font-weight:500; letter-spacing:.16em; text-transform:uppercase; font-size:13px;
  padding:12px; border-radius:6px; cursor:pointer; border:1px solid var(--accent);
  background:var(--accent); color:var(--accent-ink); transition:.15s; }
.export button:hover{background:var(--accent2); border-color:var(--accent2)}
.export button.ghost{background:transparent; color:var(--accent); border-color:var(--line2)}
.export button.ghost:hover{border-color:var(--accent); background:var(--paper2)}
.note{font-size:10.5px; color:var(--faint); line-height:1.5; margin-top:12px; letter-spacing:.02em}
/* ---- stage: the lamp's dim room ---- */
#stage{position:relative}
#scene{width:100%; height:100%; display:block}
#readout{position:absolute; left:24px; bottom:20px; pointer-events:none}
#readout .big{font-family:var(--display); font-weight:300; font-size:46px; line-height:.9; color:#ece5d8}
#readout .big b{color:#e8a24a; font-weight:500}
#readout .sub{font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:#8a8378; margin-top:8px}
#hint{position:absolute; right:22px; top:18px; font-size:10.5px; letter-spacing:.18em; text-transform:uppercase; color:#6f6a60}
@media (max-width:820px){
  #app{grid-template-columns:1fr; grid-template-rows:auto 1fr}
  #split{display:none}
  #rail{max-height:46vh}
}
</style>
</head>
<body>
<div id="app">
  <aside id="rail">
    <div class="brand"><div class="mark">Cooper<b>.</b></div></div>
    <p class="eyebrow">Parametric barrel lamp</p>
    <div class="seg" id="seg_unit" style="margin:0 0 20px">
      <button data-u="mm" class="on">mm</button>
      <button data-u="in">inches</button>
    </div>

    <div class="group">
      <h2>Form</h2>
      <div class="ctrl"><div class="row"><label>Barrel profile</label></div>
        <div class="seg grid" id="seg_profile">
          <button data-prof="custom">Custom</button>
          <button data-prof="bordeaux">Bordeaux</button>
          <button data-prof="burgundy">Burgundy</button>
          <button data-prof="puncheon">Puncheon</button>
        </div></div>
      <div class="ctrl" data-c><div class="row"><label>Height</label><span class="vwrap"><input class="vin" id="v_H" type="text" inputmode="decimal"><span class="vu" id="u_v_H"></span></span></div>
        <input type="range" id="s_H" min="150" max="360" step="1"></div>
      <div class="ctrl"><div class="row"><label>Max diameter</label><span class="vwrap"><input class="vin" id="v_W" type="text" inputmode="decimal"><span class="vu" id="u_v_W"></span></span></div>
        <input type="range" id="s_W" min="130" max="240" step="1"></div>
      <div class="ctrl"><div class="row"><label>Barrel taper</label><span class="vwrap"><input class="vin" id="v_TP" type="text" inputmode="decimal"><span class="vu" id="u_v_TP"></span></span></div>
        <input type="range" id="s_TP" min="0.6" max="0.95" step="0.01"></div>
    </div>

    <div class="group">
      <h2>Rings</h2>
      <div class="ctrl"><div class="row"><label>Ring count</label><span class="vwrap"><input class="vin" id="v_N" type="text" inputmode="decimal"><span class="vu" id="u_v_N"></span></span></div>
        <input type="range" id="s_N" min="8" max="40" step="1"></div>
      <div class="ctrl"><div class="row"><label style="color:var(--faint)">Ring spacing (gap)</label><span class="vwrap"><span class="vin" id="r_gap" style="border:none"></span><span class="vu" id="u_r_gap"></span></span></div></div>
      <div class="ctrl"><div class="row"><label>Ring width</label><span class="vwrap"><input class="vin" id="v_RW" type="text" inputmode="decimal"><span class="vu" id="u_v_RW"></span></span></div>
        <input type="range" id="s_RW" min="8" max="28" step="0.5"></div>
      <div class="ctrl"><div class="row"><label>Material thickness</label><span class="vwrap"><input class="vin" id="v_T" type="text" inputmode="decimal"><span class="vu" id="u_v_T"></span></span></div>
        <input type="range" id="s_T" min="2" max="6.5" step="0.01"></div>
      <div class="ctrl"><div class="row"><label>Joint fit (− tighter)</label><span class="vwrap"><input class="vin" id="v_FIT" type="text" inputmode="decimal"><span class="vu" id="u_v_FIT"></span></span></div>
        <input type="range" id="s_FIT" min="-0.40" max="0.10" step="0.01"></div>
      <div class="ctrl"><div class="row"><label>Wood locks (no glue)</label></div>
        <div class="seg" id="seg_lock">
          <button data-lock="top">Lock top</button>
          <button data-lock="base">Lock base</button>
        </div></div>
      <div class="ctrl"><div class="row"><label>Assembly</label></div>
        <div class="seg grid" id="seg_asm">
          <button data-asm="weave">Weave</button>
          <button data-asm="droplock">Drop-lock</button>
          <button data-asm="split">Split rings</button>
          <button data-asm="open">Open-slot ribs</button>
          <button data-asm="bayonet">Bayonet (twist-lock)</button>
        </div></div>
      <div class="ctrl"><div class="row"><label>Snap grip · drop-lock</label><span class="vwrap"><input class="vin" id="v_SNAP" type="text" inputmode="decimal"><span class="vu" id="u_v_SNAP"></span></span></div>
        <input type="range" id="s_SNAP" min="0" max="100" step="1"></div>
      <div class="ctrl"><div class="row"><label>Snap tooth · drop-lock</label></div>
        <div class="seg" id="seg_sprung">
          <button data-spr="0">Rigid</button>
          <button data-spr="1">Sprung (slit)</button>
        </div></div>
    </div>

    <div class="group">
      <h2>Diffuser disk</h2>
      <div class="ctrl"><div class="row"><label>Drop-in disk over the puck</label></div>
        <div class="seg" id="seg_diff"><button data-diff="0">Off</button><button data-diff="1">On</button></div></div>
      <div class="ctrl"><div class="row"><label>Opening Ø</label><span class="vwrap"><input class="vin" id="v_DOPEN" type="text" inputmode="decimal"><span class="vu" id="u_v_DOPEN"></span></span></div>
        <input type="range" id="s_DOPEN" min="20" max="90" step="1"></div>
      <div class="ctrl"><div class="row"><label>Rib fit</label></div>
        <div class="seg" id="seg_diffnotch"><button data-dn="1">Notched</button><button data-dn="0">No notch</button></div></div>
      <div class="ctrl"><div class="row"><label>Opening style</label></div>
        <div class="seg" id="seg_diffhex"><button data-dh="0">Open</button><button data-dh="1">Hex grid</button></div></div>
      <div class="ctrl"><div class="row"><label>Hex cell (across flats)</label><span class="vwrap"><input class="vin" id="v_HCELL" type="text" inputmode="decimal"><span class="vu" id="u_v_HCELL"></span></span></div>
        <input type="range" id="s_HCELL" min="3" max="12" step="0.5"></div>
      <div class="ctrl"><div class="row"><label>Hex wall</label><span class="vwrap"><input class="vin" id="v_HWALL" type="text" inputmode="decimal"><span class="vu" id="u_v_HWALL"></span></span></div>
        <input type="range" id="s_HWALL" min="0.6" max="2.5" step="0.1"></div>
      <div class="ctrl"><div class="row"><label>Light-test view</label></div>
        <div class="seg" id="seg_diffiso"><button data-di="0">In lamp</button><button data-di="1">Isolated</button></div></div>
      <div class="ctrl"><div id="diffreadout" style="color:#9c8d79;font-size:11.5px;padding:3px 2px 0;line-height:1.35"></div></div>
    </div>

    <div class="group">
      <h2>Top</h2>
      <div class="seg grid" id="seg_top">
        <button data-top="none">Open</button>
        <button data-top="solid">Solid</button>
        <button data-top="sign">Sign · Open</button>
        <button data-top="signsolid">Sign · Solid</button>
        <button data-top="engrsign">Engraved Sign</button>
        <button data-top="cutout">Cut Top</button>
        <button data-top="engravedtop">Engraved Top</button>
      </div>
      <input class="txt" id="num" maxlength="3" value="18" style="display:none">
      <div class="seg grid" id="seg_font" style="display:none;margin-top:10px">
        <button data-font="classic">Classic</button>
        <button data-font="wine">Wine</button>
        <button data-font="helv">Helvetica</button>
        <button data-font="arch">Architect</button>
        <button data-font="modern">Modern</button>
        <button data-font="lit">Literary</button>
        <button data-font="didone">Didone</button>
        <button data-font="sign">Signage</button>
      </div>
      <div class="seg" id="seg_style" style="display:none;margin-top:10px">
        <button data-style="classic">Classic</button>
        <button data-style="vine">Vineyard</button>
      </div>
      <div class="seg grid" id="seg_shape" style="display:none;margin-top:10px">
        <button data-shape="arch">Arch</button>
        <button data-shape="flat">Flat</button>
        <button data-shape="peak">Peak</button>
        <button data-shape="bevel">Bevel</button>
      </div>
    </div>

    <div class="group">
      <h2>LED Puck</h2>
      <div class="ctrl"><div class="row"><label>LED model</label></div>
        <div class="seg" id="seg_led">
          <button data-led="custom">Custom</button>
          <button data-led="ezvalo">EZVALO 2.9&Prime;</button>
        </div></div>
      <div class="ctrl"><div class="row"><label>Puck diameter</label><span class="vwrap"><input class="vin" id="v_PD" type="text" inputmode="decimal"><span class="vu" id="u_v_PD"></span></span></div>
        <input type="range" id="s_PD" min="40" max="110" step="0.1"></div>
      <div class="ctrl"><div class="row"><label>Puck height</label><span class="vwrap"><input class="vin" id="v_PHt" type="text" inputmode="decimal"><span class="vu" id="u_v_PHt"></span></span></div>
        <input type="range" id="s_PHt" min="10" max="45" step="0.1"></div>
      <div class="ctrl"><div class="row"><label>Lift off table</label><span class="vwrap"><input class="vin" id="v_LF" type="text" inputmode="decimal"><span class="vu" id="u_v_LF"></span></span></div>
        <input type="range" id="s_LF" min="1" max="40" step="1"></div>
    </div>

    <div class="group">
      <h2>Light</h2>
      <div class="ctrl"><div class="row"><label>Light amount</label><span class="vwrap"><input class="vin" id="v_G" type="text" inputmode="decimal"><span class="vu" id="u_v_G"></span></span></div>
        <input type="range" id="s_G" min="0" max="100" step="1"></div>
      <div class="toggle" id="t_rot"><div class="box"></div><span>Auto-rotate</span></div>
    </div>

    <div class="group">
      <h2>Presets</h2>
      <div class="ctrl"><div class="row"><label>Save to slot</label></div>
        <div class="seg five" id="saveRow">
          <button data-slot="0">1</button><button data-slot="1">2</button><button data-slot="2">3</button><button data-slot="3">4</button><button data-slot="4">5</button>
        </div></div>
      <div class="ctrl"><div class="row"><label>Load slot</label></div>
        <div class="seg five" id="loadRow">
          <button data-slot="0">1</button><button data-slot="1">2</button><button data-slot="2">3</button><button data-slot="3">4</button><button data-slot="4">5</button>
        </div></div>
      <div class="export"><button class="ghost" id="myBtn">★ My barrel · Burgundy 7.87&Prime; · 12 rings · 1/8&Prime;</button></div>
      <div class="export"><button class="ghost" id="resetBtn">Restore defaults</button></div>
    </div>

    <div class="group">
      <h2>Export</h2>
      <div class="export">
        <button id="ex_svg">Export cut file · SVG</button>
        <button class="ghost" id="ex_csv">Export ring schedule · CSV</button>
        <button class="ghost" id="ex_txt">Export assembly guide · MD</button>
        <button class="ghost" id="ex_disk">Export diffuser disk · SVG</button>
        <button class="ghost" id="ex_test">Export fit-test coupons · SVG</button>
      </div>
      <p class="note" id="exnote"></p>
    </div>
  </aside>
  <div id="split" title="Drag to resize"></div>
  <main id="stage">
    <canvas id="scene"></canvas>
    <div id="readout"><div class="big"><b id="r_n"></b> rings</div><div class="sub" id="r_dim"></div></div>
    <div id="hint">Drag to orbit · scroll to zoom</div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script>
"use strict";
const FONTS=(function(){            /* compact 7-seg digit font — replace this whole block with your original `const FONTS={...};` line to restore the 8 custom typefaces */
  const W=0.60,H=0.98,t=0.12,M=H/2;
  const seg={
    A:[[t,H-t],[W-t,H-t],[W-t,H],[t,H]],
    B:[[W-t,M],[W,M],[W,H-t],[W-t,H-t]],
    C:[[W-t,t],[W,t],[W,M],[W-t,M]],
    D:[[t,0],[W-t,0],[W-t,t],[t,t]],
    E:[[0,t],[t,t],[t,M],[0,M]],
    F:[[0,M],[t,M],[t,H-t],[0,H-t]],
    G:[[t,M-t/2],[W-t,M-t/2],[W-t,M+t/2],[t,M+t/2]]
  };
  const map={"0":"ABCDEF","1":"BC","2":"ABGED","3":"ABGCD","4":"FGBC","5":"AFGCD","6":"AFGEDC","7":"ABC","8":"ABCDEFG","9":"ABCDFG"};
  const d={}; for(const k in map){ d[k]={w:0.72,r:map[k].split("").map(s=>seg[s].map(p=>[p[0],p[1]]))}; }
  const f={d}; return {classic:f,wine:f,helv:f,arch:f,modern:f,lit:f,didone:f,sign:f};
})();
/* ========================= PARAMETERS ========================= */
const P = {
  H:235, dia:190, taper:0.76, profile:"custom",   // form
  N:22, ringW:14, T:3.18,            // rings + material
  D:6, ribW:18, apertureR:40, zShroud:70, zBot:8,
  puckD:70, puckH:24, lift:15, ledModel:"custom",                 // LED puck dimensions + lift off table
  ribTabW:14, slotFit:-0.1, numberRings:true, assembly:"weave", snapGrip:55, snapSprung:false, diffuser:false, diffOpen:60, diffHex:false, diffNotch:true, hexCell:5.2, hexWall:1.1, diskIsolate:false, bayTwist:16, bayLugD:3, wedgeTop:true, wedgeBase:true,
  topMode:"sign", number:"18", font:"classic", signStyle:"classic", engravingDepth:0.5, signShape:"arch",
  glow:55, rotate:false, unit:"mm",
  RIB_ANGLES:[0,120,240]
};
const SLOTFIT=()=>P.slotFit;
function GG(){ return P.glow*0.03; }   // 0-100% -> light factor
function derive(){
  /* --- LED mount auto-calc --- */
  P.seatIn = Math.max(P.puckD/2 - 6, 10);      // seat ledge tip (6 mm under the puck rim)
  P.wallR  = P.puckD/2 + 0.75;                 // capture wall radius (0.75 mm clearance)
  P.capH   = P.puckH + 1;                      // wall height: full puck + 1 mm
  P.apertureR = Math.max(36, P.wallR + 4);     // shroud rings stay clear of the wall
  if(PROFILES[P.profile]){ P.taper = PROFILES[P.profile].taper; }   // lock silhouette
  const minDia = P.puckD + 2*P.ringW + 34;     // lamp must physically fit around the puck
  if(P.dia < minDia) P.dia = minDia;
  if(PROFILES[P.profile]){ P.H = Math.min(1200, Math.max(60, P.dia*PROFILES[P.profile].hr)); }
  P.Rbilge = P.dia/2;
  P.Rhead  = P.Rbilge*P.taper;
  P.ringW  = Math.min(P.ringW, P.Rhead-16);     // keep an open core
  P.D      = Math.max(6, Math.min(P.ringW*0.5, P.ringW-4, 18));  // lap depth tracks ring width
  P.ribW   = Math.max(16, P.D+6);               // rib body always contains the lap
  P.slotW  = P.T + P.slotFit;
  if(P.wedgeBase){ const khz=P.T+0.10, plateTopMax=Math.max(0.8,P.T*0.45)+khz+0.2+P.T; P.lift = Math.max(P.lift, Math.ceil(plateTopMax+2.5)); } // puck seat clears the base plate below it
  P.headZ  = P.H - 7;
  const minPitch=P.slotW+3, maxN=Math.max(4,Math.floor(P.headZ/minPitch)-1);
  if(P.N>maxN) P.N=maxN;
  P.Z      = buildZ();
  P.midR   = rsOuter(P.headZ) - P.ribW/2;
  P.RCAP   = R_outer(P.headZ);
}
/* ---- silhouette + radii ---- */
function R_outer(z){ const u=z/P.H; return P.Rhead+(P.Rbilge-P.Rhead)*(1-(2*u-1)*(2*u-1)); }
function r_inner(z){
  let base=R_outer(z)-P.ringW;
  if(z<P.zShroud){ const bl=z/P.zShroud; const t=P.apertureR+bl*(base-P.apertureR); base=Math.min(base,t); }
  return Math.max(base,10);
}
function rsOuter(z){ return r_inner(z)+P.D; }
function buildZ(){
  // equal clear-air gaps everywhere: base-plate(or table) -> ring1 == ring -> ring == ringN -> cap
  const ref=(P.wedgeBase ? (Math.max(0.8,P.T*0.45)+(P.T+0.10)+0.2+P.T) : 0);  // bottom datum: top of the floating base plate, else the table
  const span=P.headZ-ref;
  const g=Math.max(0,(span-P.N*P.T)/(P.N+1));   // uniform face gap
  P.gap=g; P.pitch=g+P.T;                         // centre-to-centre = gap + thickness
  const Z=[]; for(let i=1;i<=P.N;i++) Z.push(ref + i*g + (i-0.5)*P.T);
  return Z;
}

function woodTexture(){
  const c=document.createElement("canvas"); c.width=c.height=512; const x=c.getContext("2d");
  let seed=7; const rnd=()=> (seed=(seed*16807)%2147483647)/2147483647;
  const g=x.createLinearGradient(0,0,512,512);
  g.addColorStop(0,"#6e4b2c"); g.addColorStop(0.5,"#7a5634"); g.addColorStop(1,"#684628");
  x.fillStyle=g; x.fillRect(0,0,512,512);
  for(let p=0;p<6;p++){                                  // plank bands
    const y0=p*512/6;
    x.fillStyle=`rgba(${30+rnd()*20|0},${18+rnd()*12|0},${8+rnd()*8|0},${0.06+rnd()*0.06})`;
    x.fillRect(0,y0,512,512/6);
    x.strokeStyle="rgba(20,12,6,0.55)"; x.lineWidth=1.6;  // plank seam
    x.beginPath(); x.moveTo(0,y0); x.lineTo(512,y0); x.stroke();
  }
  for(let i=0;i<140;i++){                                 // grain streaks
    const y=rnd()*512, len=80+rnd()*300, x0=rnd()*512, a=0.04+rnd()*0.09;
    x.strokeStyle=rnd()<0.5?`rgba(28,16,8,${a})`:`rgba(150,110,70,${a*0.7})`;
    x.lineWidth=0.6+rnd()*1.4;
    x.beginPath(); x.moveTo(x0,y);
    x.bezierCurveTo(x0+len*0.3,y+(rnd()-0.5)*7, x0+len*0.7,y+(rnd()-0.5)*7, x0+len,y+(rnd()-0.5)*4);
    x.stroke();
  }
  const t=new THREE.CanvasTexture(c);
  t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(2,2); t.needsUpdate=true; return t;
}

  for(const r of rings) for(const [x,y] of r){ minx=Math.min(minx,x);maxx=Math.max(maxx,x);miny=Math.min(miny,y);maxy=Math.max(maxy,y); }

function vineRings(){            // grape clusters, vine stem, leaves — cut-through decor
  const PW=P.PW, PH=P.PH, R=[];
  const circle=(cx,cy,r,n=16)=>{const a=[];for(let i=0;i<n;i++){const t=i/n*2*Math.PI;a.push([cx+r*Math.cos(t),cy+r*Math.sin(t)]);}return a;};
  // sinuous stem slot
  const y0=PH*0.64, amp=2.8, w=2.4, x0=-PW*0.36, x1=PW*0.36, N=36, top=[],bot=[];
  for(let i=0;i<=N;i++){const x=x0+(x1-x0)*i/N, y=y0+amp*Math.sin(i/N*Math.PI*2.2);
    top.push([x,y+w/2]); bot.push([x,y-w/2]);}
  R.push(top.concat(bot.reverse()));
  // hanging grape clusters
  const cluster=(cx,cy,r,rows)=>{let yy=cy;for(const n of rows){
    for(let j=0;j<n;j++) R.push(circle(cx+(j-(n-1)/2)*(r*2.05),yy,r)); yy-=r*1.9;}};
  const hw=(P._numHW||26), edge=PW/2-1.5;
  // adaptive clusters: shrink + reseat so they clear both the number and the panel edge
  const r1=Math.min(Math.max(2.6,PW*0.023), Math.max(1.6,(edge-hw-2)/6.1));
  const r2=Math.min(Math.max(2.2,PW*0.019), Math.max(1.4,(edge-hw-2)/4.1));
  cluster(-(hw+1.5+3.05*r1), y0-amp-4.2, r1, [3,2,1]);
  cluster( (hw+1.5+2.05*r2), y0-6.0,     r2, [2,1]);
  // leaves
  const leaf=(cx,cy,L,rot)=>{const a=[];
    for(let i=0;i<=12;i++){const t=i/12; a.push([t*L, Math.sin(t*Math.PI)*L*0.34]);}
    for(let i=12;i>=0;i--){const t=i/12; a.push([t*L, -Math.sin(t*Math.PI)*L*0.34]);}
    const c=Math.cos(rot),s=Math.sin(rot); return a.map(([x,y])=>[cx+x*c-y*s, cy+x*s+y*c]);};
  R.push(leaf( PW*0.06, y0+2.0, PW*0.10, 0.28));
  return R;
}

/* ---- engraving helpers --------------------------------------------------- */
const ENG_STROKE="#0000FF"; // blue = separate laser layer (lower power / defocus)
function polyEng(pts){       // engraved glyph: CLOSED, fillable shape (complete outline, not an open polyline)
  if(!pts.length) return "";
  const d="M "+pts.map(([x,y])=>`${x.toFixed(3)},${y.toFixed(3)}`).join(" L ")+" Z";
  return `<path d="${d}" fill="${ENG_STROKE}" fill-rule="evenodd" stroke="${ENG_STROKE}" stroke-width="0.1"/>`;
}
function engRects(){          // same numberRects but returns as engraving paths
  const out=[];
  for(const ring of numberRects())
    out.push(polyEng(ring));
  if(P.signStyle==="vine")
    for(const ring of decoRings())
      out.push(polyEng(ring));
  return out;
}

/* 3D engraving: burnt-wood dark groove on panel surface */
function engraveMesh(rings, faceZ, panelBaseY){
  // faceZ  = world Z of the face (+T/2 = front face, -T/2 = back face)
  // panelBaseY = world Y of the panel bottom edge
  const mat=new THREE.MeshBasicMaterial({color:0x1a0d04, side:THREE.DoubleSide, depthWrite:false});
  const grp=new THREE.Group();
  grp.position.set(0, panelBaseY, faceZ);  // translate to panel face
  for(const ring of rings){
    if(ring.length<3) continue;
    // ring coords are (x=horiz, y=height-from-panel-centre); already centred on panel
    const sh=new THREE.Shape(ring.map(([x,y])=>new THREE.Vector2(x,y)));
    const g=new THREE.ShapeGeometry(sh,1);
    const m=new THREE.Mesh(g,mat);
    grp.add(m);
  }
  return grp;
}


function backGlowTexture(){          // soft warm radial pool behind the panel
  const c=document.createElement("canvas"); c.width=c.height=256; const x=c.getContext("2d");
  const g=x.createRadialGradient(128,150,10,128,150,150);
  g.addColorStop(0,"rgba(255,196,120,1)"); g.addColorStop(0.5,"rgba(255,150,70,0.55)");
  g.addColorStop(1,"rgba(255,120,40,0)");
  x.fillStyle=g; x.fillRect(0,0,256,256);
  const t=new THREE.CanvasTexture(c); t.needsUpdate=true; return t;
}
function topMeshes(){
  const out=[]; signGlowMat=null;
  if(P.topMode==="none") return out;
  const solidCap=(P.topMode==="solid"||P.topMode==="signsolid"||P.topMode==="engrsign");
  if(P.topMode==="engrsign") P.signStyle="engraved";   // force engraved style for this mode
  if(P.topMode==="engravedtop"){
    const g=new THREE.CylinderGeometry(P.RCAP,P.RCAP,P.T,96);
    g.translate(0,P.headZ+P.T/2,0);
    const cm=new THREE.Mesh(g,woodMat); cm.castShadow=true; cm.receiveShadow=true; out.push(cm);
    P.PW=Math.min(124,1.7*P.Rhead); P.PH=92;
    // engraved top: flat horizontal surface - use a dedicated horizontal placer
    const etGrp=(function(){
      const mat=new THREE.MeshBasicMaterial({color:0x1a0d04,side:THREE.DoubleSide,depthWrite:false});
      const grp=new THREE.Group();
      for(const ring of cutoutRings()){
        if(ring.length<3) continue;
        const sh=new THREE.Shape(ring.map(([x,y])=>new THREE.Vector2(x,y)));
        const g=new THREE.ShapeGeometry(sh,1);
        const m=new THREE.Mesh(g,mat);
        m.rotation.x=-Math.PI/2; m.position.y=P.headZ+P.T+0.4; grp.add(m);
      }
      return grp;
    })();
    out.push(etGrp);
    topLight.intensity=0; return out;
  }
  if(P.topMode==="cutout"){
    P.PW=Math.min(124,1.7*P.Rhead); P.PH=92;        // basis for ring layout
    const csh=new THREE.Shape(); csh.absarc(0,0,P.RCAP,0,Math.PI*2,false);
    for(const ring of cutoutRings()){
      const h=new THREE.Path(); h.moveTo(ring[0][0],ring[0][1]);
      for(let i=1;i<ring.length;i++) h.lineTo(ring[i][0],ring[i][1]);
      h.closePath(); csh.holes.push(h);
    }
    const cg=new THREE.ExtrudeGeometry(csh,{depth:P.T,bevelEnabled:false,curveSegments:96});
    cg.rotateX(-Math.PI/2); cg.translate(0,P.headZ+P.T,0);
    const cm=new THREE.Mesh(cg,woodMat); cm.castShadow=true; cm.receiveShadow=true; out.push(cm);
    topLight.intensity=0;
    return out;
  }
  if(solidCap){
    const g=new THREE.CylinderGeometry(P.RCAP,P.RCAP,P.T,96);
    g.translate(0,P.headZ+P.T/2,0);
    const cm=new THREE.Mesh(g,woodMat); cm.castShadow=true; cm.receiveShadow=true; out.push(cm);
  } else {
    const sh=new THREE.Shape(); sh.absarc(0,0,P.RCAP,0,Math.PI*2,false);
    const h=new THREE.Path(); h.absarc(0,0,38,0,Math.PI*2,true); sh.holes.push(h);
    const cg=new THREE.ExtrudeGeometry(sh,{depth:P.T,bevelEnabled:false,curveSegments:96});
    cg.rotateX(-Math.PI/2); cg.translate(0,P.headZ,0);
    const cm=new THREE.Mesh(cg,woodMat); cm.castShadow=true; cm.receiveShadow=true; out.push(cm);
  }
  if(P.topMode==="sign"||P.topMode==="signsolid"||P.topMode==="engrsign"){
    P.PW=Math.min(124,1.7*P.Rhead); P.PH=92;
    const tw=14, armL=10, armT=P.T*0.95, tp=Math.min(50,P.PW/2-12-armL);
    const isEngSign=(P.signStyle==="engraved");
    const psh=new THREE.Shape();
    psh.moveTo(-P.PW/2,0);
    for(const xc of [-tp, tp]){
      psh.lineTo(xc-tw/2,0); psh.lineTo(xc-tw/2,-P.T);
      psh.lineTo(xc-tw/2-armL,-P.T); psh.lineTo(xc-tw/2-armL,-(P.T+armT));
      psh.lineTo(xc+tw/2,-(P.T+armT)); psh.lineTo(xc+tw/2,0);
    }
    const tpe=panelTop(P.PW,P.PH);
    psh.lineTo(P.PW/2,0); psh.lineTo(P.PW/2,tpe.side);
    for(const [qx,qy] of tpe.pts) psh.lineTo(qx,qy);
    psh.lineTo(-P.PW/2,tpe.side); psh.lineTo(-P.PW/2,0);
    if(!isEngSign){                                   // cut-through only for non-engraved styles
      for(const ring of numberRects()){
        const h=new THREE.Path(); h.moveTo(ring[0][0],ring[0][1]);
        for(let i=1;i<ring.length;i++) h.lineTo(ring[i][0],ring[i][1]);
        h.closePath(); psh.holes.push(h);
      }
    }
    const pgm=new THREE.ExtrudeGeometry(psh,{depth:P.T,bevelEnabled:false,curveSegments:1});
    pgm.translate(0,0,-P.T/2);
    const panelMat=new THREE.MeshStandardMaterial({color:0x2b1c0f,roughness:0.8});
    const m=new THREE.Mesh(pgm,panelMat);
    m.castShadow=true; m.receiveShadow=true;
    m.position.set(0,P.headZ+P.T,0); out.push(m);
    if(isEngSign){                                    // burnt engraving on both faces
      const panelBase=P.headZ+P.T;   // Y of panel bottom edge in world space
      const halfT=P.T/2+0.4;          // tiny offset above surface to avoid z-fight
      const frontGrp=engraveMesh(numberRects(), halfT, panelBase);
      out.push(frontGrp);
      const backGrp=engraveMesh(numberRects(), -halfT, panelBase);
      backGrp.scale.x=-1;             // mirror so it reads correctly from behind
      out.push(backGrp);
      if(P.signStyle==="vine"){
        const fd=engraveMesh(decoRings(), halfT+0.1, panelBase);
        out.push(fd);
        const bd=engraveMesh(decoRings(), -halfT-0.1, panelBase);
        bd.scale.x=-1; out.push(bd);
      }
    }
    if(P.topMode==="sign"){                        // open cap: backlight glows through
      const reach=Math.exp(-P.H/420);                 // open cap: core light spills up behind panel
      const gt=backGlowTexture();
      signGlowMat=new THREE.MeshBasicMaterial({map:gt,transparent:true,depthWrite:false,
        blending:THREE.AdditiveBlending,opacity:Math.min(1,GG()*0.9*reach)});
      const gp=new THREE.Mesh(new THREE.PlaneGeometry(P.PW*1.05,P.PH*1.1),signGlowMat);
      gp.position.set(0,P.headZ+P.T+P.PH*0.5,-P.T*0.9); out.push(gp);
      const gp2=gp.clone(); gp2.position.z=P.T*0.9; gp2.rotation.y=Math.PI; out.push(gp2);
      topLight.position.set(0,P.headZ+P.T+P.PH*0.45,0);
      topLight.intensity=GG()*0.5*reach;
    } else {
      topLight.intensity=0;                           // solid cap blocks the core light: unlit stencil
    }
  }
  return out;
}
let puckMesh, signGlowMat=null;
function diskMesh(){
  const {zDisk,rOut,rNotchIn,openR}=diskRadii(), w=P.slotW/2+0.15;
  const sh=new THREE.Shape();
  if(P.diffNotch){
    const C=P.RIB_ANGLES.map(d=>d*Math.PI/180).sort((a,b)=>a-b);
    const hw=Math.asin(Math.min(0.99,w/rOut)), rot=(ang,rad,off)=>[rad*Math.cos(ang)-off*Math.sin(ang), rad*Math.sin(ang)+off*Math.cos(ang)];
    let first=true;
    for(let i=0;i<C.length;i++){ const c=C[i];
      const a0=(i>0?C[i-1]:C[C.length-1]-2*Math.PI)+hw, a1=c-hw, steps=Math.max(2,Math.round((a1-a0)*rOut/3));
      for(let k=0;k<=steps;k++){ const aa=a0+(a1-a0)*k/steps, x=rOut*Math.cos(aa), y=rOut*Math.sin(aa); if(first){sh.moveTo(x,y);first=false;} else sh.lineTo(x,y); }
      let p; p=rot(c,rOut,-w);sh.lineTo(p[0],p[1]); p=rot(c,rNotchIn,-w);sh.lineTo(p[0],p[1]); p=rot(c,rNotchIn,+w);sh.lineTo(p[0],p[1]); p=rot(c,rOut,+w);sh.lineTo(p[0],p[1]);
    }
    sh.closePath();
  } else { sh.absarc(0,0,rOut,0,Math.PI*2,false); }
  if(P.diffHex){ for(const h of hexCells(openR)){ const hp=new THREE.Path(); hp.moveTo(h[0][0],h[0][1]); for(let k=1;k<6;k++)hp.lineTo(h[k][0],h[k][1]); hp.closePath(); sh.holes.push(hp); } }
  else { const hp=new THREE.Path(); hp.absarc(0,0,openR,0,Math.PI*2,true); sh.holes.push(hp); }
  const g=new THREE.ExtrudeGeometry(sh,{depth:P.T,bevelEnabled:false,curveSegments:48});
  g.rotateX(-Math.PI/2); g.translate(0, zDisk+P.T/2, 0);
  const m=woodMat.clone(); m.castShadow=true; m.receiveShadow=true;
  const mesh=new THREE.Mesh(g,m); mesh.castShadow=true; return mesh;
}
let DTAU=1, DZ=0;
function diskTransmission(){ if(!P.diffuser) return 1; const R=diskRadii(), pr=P.puckD/2; let t=Math.min(1,(R.openR*R.openR)/(pr*pr)); if(P.diffHex){ const f=Math.max(2.5,P.hexCell), w=Math.max(0.6,P.hexWall); t*=(f/(f+w))*(f/(f+w)); } return t; }
function upDim(){ return P.diffuser ? (0.2+0.8*DTAU) : 1; }        // upward-throw factor from the disk (estimate)
function diskDim(z){ return (P.diffuser && z>DZ) ? (0.2+0.8*DTAU) : 1; } // rings above the disk get the reduced light
function rebuild(){
  derive();
  DTAU=diskTransmission(); DZ=P.lift+P.puckH;
  { const el=document.getElementById("diffreadout"); if(el) el.textContent = P.diffuser ? ("Est. light reaching the upper lamp \u2248 "+Math.round(DTAU*100)+"% of the bare puck"+(P.diffHex?", hex-diffused":"")) : ""; }
  for(let i=lamp.children.length-1;i>=0;i--){ const o=lamp.children[i]; lamp.remove(o); if(o.geometry)o.geometry.dispose(); }
  if(!P.diskIsolate){                                       // full lamp; isolated view hides everything but the puck + disk
    if(P.assembly==="split"){ for(const z of P.Z){ lamp.add(halfRingMesh(z,0)); lamp.add(halfRingMesh(z,1)); } }
    else { for(const z of P.Z) lamp.add(ringMesh(z)); }
    for(const a of P.RIB_ANGLES) lamp.add(ribMesh(a));
    if(P.topMode!=="none" && P.wedgeTop){ const L=topLock(); for(const a of P.RIB_ANGLES) lamp.add(keyMesh(a, L.capTop+L.khz/2+0.2, P.midR, L.kw)); }
    if(P.wedgeBase){ lamp.add(basePlateMesh()); const B=baseLock();
      for(const a of P.RIB_ANGLES) lamp.add(keyMesh(a, B.keyZc, B.tabMid, B.kw)); }
    for(const m of topMeshes()) lamp.add(m);
  }
  const pg=new THREE.CylinderGeometry(P.puckD/2-0.8,P.puckD/2-0.8,P.puckH,48);
  pg.translate(0,P.lift+P.puckH/2,0);
  puckMesh=new THREE.Mesh(pg,[puckSideMat,puckMat,puckBotMat]);   // side / top lens / dark bottom
  puckMesh.castShadow=true; lamp.add(puckMesh);
  if(P.diffuser) lamp.add(diskMesh());
  const ph=P.lift+P.puckH;                       // lens height (top of puck)
  beam.position.set(0,ph+1,0); beamTarget.position.set(0,P.H*1.2,0);
  beam.intensity=GG()*2.6*upDim(); beam.distance=P.H*2.6;
  spill.position.set(0,P.lift+P.puckH+0.5,0); spill.intensity=GG()*0.9;
  topLight.decay=2; topLight.distance=P.PH?P.PH*3:300; if(P.topMode!=="sign") topLight.intensity=0;
  puckMat.emissiveIntensity=GG()*3.2;               // the lens itself is the brightest thing
  if(bloom){ bloom.strength=0.45+GG()*0.35; bloom.threshold=0.62; }
  target.set(0, P.diskIsolate ? (P.lift+P.puckH+6) : P.H*0.5, 0);
  document.getElementById("r_n").textContent=P.N;
  { const g=document.getElementById("r_gap"), u=document.getElementById("u_r_gap");
    if(g){ if(P.unit==="in"){ g.textContent=(P.gap/25.4).toFixed(3); u.textContent=" \u2033"; }
           else { g.textContent=P.gap.toFixed(1); u.textContent=" mm"; } } }
  document.getElementById("r_dim").textContent = (P.unit==="in")
    ? `${(P.dia/25.4).toFixed(1)}\u2033 wide · ${(P.H/25.4).toFixed(1)}\u2033 tall · ${(P.gap/25.4).toFixed(2)}\u2033 gap`
    : `${Math.round(P.dia)}mm wide · ${Math.round(P.H)}mm tall · ${P.gap.toFixed(1)}mm gap`;
  syncLabels();
}

function poly(points){
  const p=[points[0]];
  for(let i=1;i<points.length;i++){ const q=points[i],l=p[p.length-1];
    if(Math.abs(q[0]-l[0])>1e-3||Math.abs(q[1]-l[1])>1e-3) p.push(q); }
  return `<path d="M ${p.map(q=>q[0].toFixed(3)+","+q[1].toFixed(3)).join(" L ")} Z" fill="none" stroke="#000" stroke-width="0.1"/>`;
}
function ringLabelEng(cx,cy,z,label,ang){  // tiny engraved order # in the outer band
  if(ang===undefined) ang=-Math.PI/2;        // default: top of the ring
  const DG=FONTS.classic.d, h=Math.min(5.5,P.ringW*0.55), gap=0.12*h;
  const Rp=R_outer(z)-h*0.6-2, bx=cx+Rp*Math.cos(ang), by=cy+Rp*Math.sin(ang);
  const ds=String(label).split(""); let tot=0;
  for(const d of ds){ const g=DG[d]; if(g) tot+=g.w*h; } tot+=gap*(ds.length-1);
  let x=-tot/2; const out=[];
  for(const d of ds){ const g=DG[d]; if(!g) continue;
    for(const ring of g.r) out.push(polyEng(ring.map(([px,py])=>[bx+x+px*h, by-(py-0.5)*h])));
    x+=g.w*h+gap;
  }
  return out;
}
function labelEng(cx,cy,str,h){    // engrave a short numeric label (digits, minus, plus, dot) centred at (cx,cy)
  const DG=FONTS.classic.d, gap=0.16*h, out=[];
  const wof=ch=> (ch>="0"&&ch<="9")?DG[ch].w*h : ch==="."?0.30*h : (ch==="-"||ch==="+")?0.62*h : 0.4*h;
  let tot=0; for(const ch of str) tot+=wof(ch)+gap; tot-=gap;
  let x=cx-tot/2;
  for(const ch of str){
    if(ch>="0"&&ch<="9"){ const g=DG[ch]; for(const ring of g.r) out.push(polyEng(ring.map(([px,py])=>[x+px*h, cy-(py-0.5)*h]))); }
    else if(ch==="."){ const s=0.16*h, yb=cy+0.42*h; out.push(polyEng([[x,yb-s],[x+s,yb-s],[x+s,yb],[x,yb]])); }
    else if(ch==="-"){ const w=0.5*h,t=0.13*h; out.push(polyEng([[x,cy-t/2],[x+w,cy-t/2],[x+w,cy+t/2],[x,cy+t/2]])); }
    else if(ch==="+"){ const w=0.5*h,t=0.13*h; out.push(polyEng([[x,cy-t/2],[x+w,cy-t/2],[x+w,cy+t/2],[x,cy+t/2]]));
      out.push(polyEng([[x+w/2-t/2,cy-w*0.5],[x+w/2+t/2,cy-w*0.5],[x+w/2+t/2,cy+w*0.5],[x+w/2-t/2,cy+w*0.5]])); }
    x+=wof(ch)+gap;
  }
  return out;
}
function halfRingSVG(cx,cy,z,side){          // split-ring half with its share of rib notches
  const Ro=R_outer(z), ri=r_inner(z), gp=2*Math.PI/180;
  const a0=(side?Math.PI/2:-Math.PI/2)+gp, a1=(side?3*Math.PI/2:Math.PI/2)-gp;
  const half=Math.asin((P.slotW/2)/ri);
  const ribs=P.RIB_ANGLES.map(d=>d*Math.PI/180).map(a=>{ while(a<a0)a+=2*Math.PI; while(a>a1+1e-9)a-=2*Math.PI; return a; })
    .filter(a=>a>=a0-1e-9 && a<=a1+1e-9).sort((x,y)=>x-y);
  const pts=[], No=Math.max(10,Math.round((a1-a0)*Ro/4));
  for(let k=0;k<=No;k++){ const a=a0+(a1-a0)*k/No; pts.push([cx+Ro*Math.cos(a),cy+Ro*Math.sin(a)]); }
  let aPrev=a1;
  for(let i=ribs.length-1;i>=0;i--){ const c=ribs[i], lead=c+half, trail=c-half;
    const n1=Math.max(2,Math.round(Math.abs(aPrev-lead)*ri/4));
    for(let k=0;k<=n1;k++){ const a=aPrev+(lead-aPrev)*k/n1; pts.push([cx+ri*Math.cos(a),cy+ri*Math.sin(a)]); }
    pts.push([cx+(ri+P.D)*Math.cos(lead),cy+(ri+P.D)*Math.sin(lead)]);
    for(let k=0;k<=5;k++){ const a=lead+(trail-lead)*k/5; pts.push([cx+(ri+P.D)*Math.cos(a),cy+(ri+P.D)*Math.sin(a)]); }
    pts.push([cx+ri*Math.cos(trail),cy+ri*Math.sin(trail)]); aPrev=trail;

  } else {
    m+=S("Set up the ribs")+"Stand the three ribs in a 120\u00B0 tripod on your own base or jig (no base lock is selected). They'll be wobbly until the rings tie them together \u2014 enable **Lock base** in the app for the no-glue locking plate.\n\n";
  }
  m+=S("Add the rings, bottom (#1) to top (#"+N+")")+ASM.add+" Work in order from the bottom up; each ring stiffens the assembly.\n\n";
  if(!split) m+="> Don't try to slide a ring lengthwise down a rib \u2014 the tapered rings bind. Seat each one at its own level.\n\n";
  if(drop) m+="> While the rib tops are still free you can spread them slightly to help a ring reach its seat.\n\n";
  m+=S("Fit the LED puck")+(hasCap?"Before the cap goes on, lower":"Lower")+" the puck down the core onto the seat the three ribs form ("+L(P.lift)+" up, lens facing up). Route its cable down between the ribs and out "+(baseLocked?"under the base plate":"the bottom")+".\n\n";
  if(hasCap){
    m+=S("Cap the top")+"Lower the cap over the three rib top tenons (they pass up through the cap's slots) until it seats."+(isSign?" Then fit the sign panel into the cap's keyways.":"")+"\n\n";
    if(topLocked) m+=S("Lock the top")+"Slide a top wedge key through each tenon mortise above the cap and tap it home. This pulls the cap down and compresses the whole stack \u2014 "+(drop?"every snap-lock ring is now trapped":"every ring is now clamped")+" and the lamp is rigid.\n\n";
  } else {
    m+=S("Finish the top")+"This design has an open top, so the top ring is the top. (Add a top and **Lock top** in the app if you want a wedge-locked cap.)\n\n";
  }
  m+=S("Final check")+(baseLocked?"Re-tap the base wedges \u2014 they often loosen once the stack is compressed. ":"")+"Stand it up and power the puck.\n\n";
  if(P.diffuser){ const d=diskRadii(); m+=S("Drop in the diffuser disk")+"After the rings up to the puck top are on (and before you close the rings above it), "+(P.diffNotch?"lower the diffuser disk down the three ribs (its notches thread over them) so it rests on top of the LED puck":"drop the plain diffuser disk straight down between the ribs so it rests on top of the LED puck")+" \u2014 it floats there, no fixing needed. "+(P.diffHex?"The hex-grid port throws light up through the honeycomb while the cell walls hide the bare LED from side view.":"The open "+(2*d.openR).toFixed(0)+" mm port lets the beam up while the disk hides the puck rim and side glare.")+"\n\n"; }
  m+="## Troubleshooting\n";
  m+="- **Ring too tight:** sand the slot cheeks on the ring, or loosen the joint-fit slider and re-cut that ring.\n";
  m+=drop?"- **Snap too weak or too stiff:** use the *Snap grip* slider and re-cut \u2014 turn it up for a firmer click, down for an easier push-on. (Joint-fit tunes how tight the ring sits on the rib; sandpaper only eases a slot that came out physically too tight.)\n":"- **Ring loose:** tighten the joint-fit slider and re-cut, or a dot of glue at one rib.\n";
  if(baseKeys||topKeys) m+="- **Wedge won't stay:** tap firmer; if still proud, add a strip of tape to one face of the key.\n";
  m+="- **Light leaks low down:** that's the puck base; "+(baseLocked?"the base plate hides most of it. To hide more, turn off Lock base so the puck sits lower (you lose the no-glue base lock).":"add more rings or lower the puck lift.")+"\n";
  m+="\n*No glue is needed where wedges are used, so the lamp comes apart for re-lamping or finishing. Keep each wedge with its rib.*\n";
  return m;
}

function setVal(id,val,unit){

function syncLabels(){
  const IN=(P.unit==="in"), U=IN?"in":"mm";
  const D=(v,dmm,din)=> IN ? (v/25.4).toFixed(din===undefined?2:din) : (+v).toFixed(dmm===undefined?0:dmm);
  setVal("v_H",D(P.H),U); setVal("v_W",D(P.dia),U); setVal("v_TP",P.taper.toFixed(2),"");
  const sset=(id,v)=>{const e=document.getElementById(id); if(e&&document.activeElement!==e) e.value=v;};
  sset("s_H",P.H); sset("s_W",P.dia); sset("s_TP",P.taper); sset("s_FIT",P.slotFit);
  setVal("v_N",P.N,""); setVal("v_RW",D(P.ringW,1),U);
  const tTag=Math.abs(P.T-3.18)<0.05?' · 1/8"':(Math.abs(P.T-6.35)<0.05?' · 1/4"':"");
  setVal("v_T",D(P.T,2,3),U+tTag);
  setVal("v_FIT",P.slotFit.toFixed(2),"mm");
  setVal("v_SNAP",Math.round(P.snapGrip),"%"); sset("s_SNAP",P.snapGrip);
  setVal("v_DOPEN",Math.round(P.diffOpen),"mm"); sset("s_DOPEN",P.diffOpen);
  setVal("v_HCELL",P.hexCell.toFixed(1),"mm"); sset("s_HCELL",P.hexCell);
  setVal("v_HWALL",P.hexWall.toFixed(1),"mm"); sset("s_HWALL",P.hexWall);
  setVal("v_G",Math.round(P.glow),"%");
  setVal("v_PD",D(P.puckD,1),U); setVal("v_PHt",D(P.puckH,1),U); setVal("v_LF",D(P.lift),U);
  const L=(v,d)=> IN ? (v/25.4).toFixed(2)+'"' : Math.round(v)+" mm";
  document.getElementById("exnote").textContent =
    `SVG is the laser cut file (black hairline = cut). Fin mount auto-sized: seat ledge Ø${L(2*P.seatIn)}–${L(P.puckD)} at ${L(P.lift)} lift, capture wall to ${L(P.lift+P.capH)}. CSV includes the full schedule.`;
}
/* typed values: any number, mm or inches, Enter/blur to apply */
/* any number, decimal or fraction, with optional mm/in/cm suffix */
function parseDim(str,isDim){
  str=String(str).trim().toLowerCase().replace(/[\u2033\u201d\u2019\u2032]/g,'"');
  let unit=null;
  const um=str.match(/(inches|inch|in|mm|cm)\s*$/);
  if(str.includes('"')||(um&&um[1][0]==="i")) unit="in";
  else if(um&&um[1]==="mm") unit="mm";
  else if(um&&um[1]==="cm") unit="cm";
  str=str.replace(/"/g," ").replace(/(inches|inch|in|mm|cm)\s*$/," ").trim();
  let v=NaN;
  let m;
  if(m=str.match(/^(\d+)\s+(\d+)\s*\/\s*(\d+)$/))      v=(+m[1])+(+m[2])/(+m[3]);   // 1 1/2
  else if(m=str.match(/^(\d*\.?\d+)\s*\/\s*(\d*\.?\d+)$/)) v=(+m[1])/(+m[2]);     // 3/8
  else v=parseFloat(str);
  if(!isFinite(v)) return null;
  if(isDim){
    const u=unit||(P.unit==="in"?"in":"mm");
    if(u==="in") v*=25.4; else if(u==="cm") v*=10;
  }
  return v;
}

const USER_KEYS=["H","dia","taper","profile","N","ringW","T","slotFit","numberRings","assembly","snapGrip","snapSprung","diffuser","diffOpen","diffHex","diffNotch","hexCell","hexWall","diskIsolate","wedgeTop","wedgeBase","puckD","puckH","lift","ledModel","topMode","number","font","glow","rotate","unit"];
const DEFAULTS=(()=>{const o={};for(const k of USER_KEYS)o[k]=P[k];return JSON.parse(JSON.stringify(o));})();
const PKEY="cooperLampPresets";
let slots=[null,null,null,null,null];
function readSlots(){ try{ const v=JSON.parse(localStorage.getItem(PKEY)); if(Array.isArray(v)&&v.length===5) slots=v; }catch(e){} }
function writeSlots(){ try{ localStorage.setItem(PKEY,JSON.stringify(slots)); }catch(e){} }
function snapshot(){ const o={}; for(const k of USER_KEYS) o[k]=P[k]; return JSON.parse(JSON.stringify(o)); }
function refreshSlotUI(){
  document.querySelectorAll("#loadRow button").forEach(b=>b.classList.toggle("on",!!slots[+b.dataset.slot]));
  document.querySelectorAll("#saveRow button").forEach(b=>b.classList.toggle("on",!!slots[+b.dataset.slot]));
}
function applyPreset(o){
  o=JSON.parse(JSON.stringify(o));
  if(o.glow!==undefined && o.glow<=3) o.glow=Math.round(o.glow/3*100);   // migrate old scale
  Object.assign(P,o);
  const map={H:"s_H",dia:"s_W",taper:"s_TP",N:"s_N",ringW:"s_RW",T:"s_T",puckD:"s_PD",puckH:"s_PHt",lift:"s_LF",glow:"s_G"};
  for(const k in map){ const el=document.getElementById(map[k]); if(el) el.value=P[k]; }
  document.getElementById("num").value=P.number;
  tRot.classList.toggle("on",P.rotate);
  fontBtns.forEach(b=>b.classList.toggle("on",b.dataset.font===P.font));
  styleBtns.forEach(b=>b.classList.toggle("on",b.dataset.style===(P.signStyle||"classic")));
  shapeBtns.forEach(b=>b.classList.toggle("on",b.dataset.shape===(P.signShape||"arch")));
  unitBtns.forEach(b=>b.classList.toggle("on",b.dataset.u===(P.unit||"mm")));
  profBtns.forEach(b=>b.classList.toggle("on",b.dataset.prof===(P.profile||"custom")));
  asmBtns.forEach(b=>b.classList.toggle("on",b.dataset.asm===(P.assembly||"weave")));
  paintLocks(); paintSprung(); paintDiff(); paintDiffHex(); paintDiffNotch(); paintDiffIso();
  ledBtns.forEach(b=>b.classList.toggle("on",b.dataset.led===(P.ledModel||"custom")));
  setTop(P.topMode);                                   // updates seg UI + rebuild
  syncLabels();
}
